services:
  - type: web
    name: trust-education-backend
    env: node
    rootDir: Backend
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false