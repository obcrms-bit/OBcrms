services:
  - type: web
    name: trust-education-crm-api
    runtime: node
    rootDir: Backend
    branch: main
    plan: free
    region: oregon
    autoDeployTrigger: commit
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FOLLOWUP_REMINDER_ENABLED
        value: true
      - key: FOLLOWUP_REMINDER_INTERVAL_MINUTES
        value: 15
      - key: FOLLOWUP_REMINDER_FREQUENCY_MINUTES
        value: 180
      - key: FOLLOWUP_DAILY_SUMMARY_ENABLED
        value: false
      - key: LOG_LEVEL
        value: info
